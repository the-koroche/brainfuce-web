<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Brainfuck Code Editor</title>
        <link rel="stylesheet" href="styles/style.css">
        <link rel="stylesheet" href="styles/speed-control.css">
        <link rel="stylesheet" href="styles/checkbox.css">
    </head>
    <body>
        <div id="root">
            <div id="title-container">
                <h1>Brainfuck Code Editor</h1>
                <h3>Tutorial: <a href="https://en.wikipedia.org/wiki/Brainfuck">Wikipedia</a></h3>
            </div>
            <hr>
            <div id="editor-container">
                <div id="editor-controls">
                    <div class="hbox">
                        <div class="vbox">
                            <button class="bf" id="run-button">[&gt;]</button>
                            <h4 class="bf-title" id="run-title">Run</h4>
                        </div>
                        <div class="vbox">
                            <button class="bf" id="stop-button">[-]</button>
                            <h4 class="bf-title" id="stop-title">Stop</h4>
                        </div>
                        <div class="vbox">
                            <button class="bf" id="step-button">&gt;+</button>
                            <h4 class="bf-title" id="step-title">Step</h4>
                        </div>
                        <div class="vbox">
                            <button class="bf" id="reset-button">&lt;</button>
                            <h4 class="bf-title" id="reset-title">Reset</h4>
                        </div>
                    </div>

                    <div class="speed-controller">
                        <h4 class="bf-title">Speed</h4>
                        <div class="range-slider" id="slider-track">
                            <div class="range-slider-thumb" id="slider-thumb">
                                <div class="range-slider-thumb-line left"></div>
                                <div class="range-slider-thumb-line right"></div>
                            </div>
                            <div class="range-slider-tick" style="left: 0%;"></div>
                            <div class="range-slider-tick" style="left: 25%;"></div>
                            <div class="range-slider-tick" style="left: 50%;"></div>
                            <div class="range-slider-tick" style="left: 75%;"></div>
                            <div class="range-slider-tick" style="left: 100%;"></div>
                        </div>
                        <span class="speed-text-message" id="speed-label">50 ms</span>
                    </div>
                    <div class="hbox">
                        <div class="checkbox-container">
                            <label class="bf-title">
                                <input type="checkbox" id="autoscroll-memory-check" checked>
                                <div class="checkbox-text">Autoscroll memory</div>
                            </label>
                        </div>
                        <div class="checkbox-container">
                            <label class="bf-title">
                                <input type="checkbox" id="highlight-command-check" checked>
                                <div class="checkbox-text">Highlight command</div>
                            </label>
                        </div>
                    </div>
                </div>

                <div id="code-state">
                    <div id="memory">
                        <h3 id="memory-title">Memory</h3>
                        <div id="memory-box">
                            <!-- JS will populate this
                            <div class="memory-cell" id="mem-1">
                                <div class="memory-index">1</div>
                                <div>152</div>
                            </div>
                            -->
                        </div>
                    </div>
                    <div id="code-input-container">
                        <h3>Code</h3>
                        <textarea id="code-input"></textarea>
                    </div>
                    <div id="output-container">
                        <h3>Output</h3>
                        <textarea readonly id="output"></textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="spacer"></div>
        <footer>
            <div id="footer-container">
                <hr>
                <h3>Created by <a href="https://github.com/the-koroche">the-koroche</a></h3>
                <h3>Also check out <a href="https://github.com/the-koroche/brainfuce-web">Source</a></h3>
                <h3>Licensed under <a href="https://github.com/the-koroche/brainfuce-web/blob/main/LICENSE">MIT License</a></h3>
            </div>
        </footer>

        <script type="module" src="main.js"></script>
        <script type="module" src="codeinput_resize.js"></script>
    </body>
</html>
